services:
  - type: web
    name: smartpay-backend
    plan: free
    runtime: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn smartpay_backend.wsgi:application"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: smartpay-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "*" # Update this with your actual domain later

databases:
  - name: smartpay-db
    plan: free
